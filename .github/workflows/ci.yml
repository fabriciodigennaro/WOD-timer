name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Generate coverage report
        run: ./gradlew jacocoUnitTestReport --no-daemon

      - name: Check coverage threshold
        run: |
          COVERAGE=$(python3 -c "
import xml.etree.ElementTree as ET
tree = ET.parse('app/build/reports/jacoco/jacocoUnitTestReport/jacocoUnitTestReport.xml')
root = tree.getroot()
counters = root.findall('.//counter[@type=\"INSTRUCTION\"]')
missed = sum(int(c.get('missed', 0)) for c in counters)
covered = sum(int(c.get('covered', 0)) for c in counters)
total = missed + covered
pct = covered * 100.0 / total if total > 0 else 0.0
print(f'Coverage: {covered}/{total} = {pct:.1f}%')
if pct < 95.0:
  print('FAIL: Coverage below 95%')
  exit(1)
print('PASS: Coverage >= 95%')
")
          echo "$COVERAGE"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: app/build/reports/jacoco/jacocoUnitTestReport/html/
          retention-days: 14

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: app/build/reports/tests/
          retention-days: 14
